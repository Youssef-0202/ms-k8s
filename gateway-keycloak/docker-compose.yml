version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: keycloak_postgres
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
      POSTGRES_DB: keycloak
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:26.3.4
    container_name: keycloak_compose
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
    ports:
      - "127.0.0.1:8443:8080"
    depends_on:
      - postgres
    restart: unless-stopped

  gateway-postgres:
    image: postgres:16
    container_name: gateway_postgres
    environment:
      POSTGRES_USER: admin_gateway
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: gateway_db
    volumes:
      - gateway_postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"  # Different port to avoid conflict with Keycloak DB
    restart: unless-stopped


volumes:
  postgres_data:
  gateway_postgres_data:
